<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinny 3DP — {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--sidebar-bg:#0f1117;--sidebar-w:220px;--body-bg:#f0f2f5;--card-bg:#ffffff;--text-dark:#111827;--text-mid:#4b5563;--text-light:#9ca3af;--border:#e5e7eb;--radius:10px;--shadow:0 1px 4px rgba(0,0,0,.08);--pink:#e91e63}
    body{font-family:'Inter',sans-serif;background:var(--body-bg);color:var(--text-dark);display:flex;min-height:100vh}
    .sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
    .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
    .app-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:.4px}
    .app-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;font-family:'JetBrains Mono',monospace}
    .nav-section{padding:12px 0 4px}
    .nav-label{font-size:10px;font-weight:600;letter-spacing:1.2px;color:rgba(255,255,255,.25);padding:0 20px 6px;text-transform:uppercase}
    .nav-link{display:flex;align-items:center;gap:9px;padding:9px 20px;color:rgba(255,255,255,.6);text-decoration:none;font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:all .15s}
    .nav-link:hover{background:rgba(255,255,255,.05);color:#fff}
    .nav-link.active{background:rgba(255,255,255,.07);color:#fff;border-left-color:var(--pink)}
    .city-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .sidebar-footer{margin-top:auto;padding:16px 16px 20px;border-top:1px solid rgba(255,255,255,.07)}
    .sync-btn{width:100%;padding:10px;background:var(--pink);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
    .sync-btn:hover{background:#c2185b}
    .sync-btn:disabled{background:#555;cursor:not-allowed}
    .main{margin-left:var(--sidebar-w);flex:1;padding:28px 30px}
    .page-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
    .page-title{font-size:20px;font-weight:700}
    .page-meta{font-size:12px;color:var(--text-light)}
    .cards-row{display:grid;gap:14px;margin-bottom:22px}
    .cards-4{grid-template-columns:repeat(4,1fr)}
    .cards-3{grid-template-columns:repeat(3,1fr)}
    .cards-2{grid-template-columns:repeat(2,1fr)}
    .card{background:var(--card-bg);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--border)}
    .card-label{font-size:11.5px;color:var(--text-light);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
    .card-value{font-size:26px;font-weight:800;margin-top:6px;line-height:1}
    .card-sub{font-size:12px;color:var(--text-mid);margin-top:5px}
    .city-card{background:var(--card-bg);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);border:1px solid var(--border);border-top:3px solid}
    .city-card-name{font-size:13px;font-weight:700;margin-bottom:12px}
    .table-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
    .table-card-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
    .table-card-header small{font-size:11px;color:var(--text-light);font-weight:400}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);background:#fafafa;border-bottom:1px solid var(--border)}
    tbody tr{border-bottom:1px solid var(--border)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#fafafa}
    tbody td{padding:9px 14px;color:var(--text-dark)}
    .td-part{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
    .b-completed{background:#dcfce7;color:#166534}
    .b-failed{background:#fee2e2;color:#991b1b}
    .b-printing{background:#dbeafe;color:#1e40af}
    .b-cancelled{background:#f3f4f6;color:#6b7280}
    .b-queued{background:#fef9c3;color:#854d0e}
    .b-fulfilled{background:#dcfce7;color:#166534}
    .b-pending{background:#fef9c3;color:#854d0e}
    .b-city{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;color:#fff}
    .section-title{font-size:14px;font-weight:600;color:var(--text-mid);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px}
    .mono{font-family:'JetBrains Mono',monospace;font-size:12px}
    .text-green{color:#16a34a}
    .text-red{color:#dc2626}
    select.filter-select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;cursor:pointer}
    input.search-input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;width:260px}
    @media(max-width:900px){.cards-4{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="app-name">🖨️ Spinny 3DP</div>
    <div class="app-sub">Fleet Operations CRM</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <a href="/" class="nav-link {% if active=='dash' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Cities</div>
    <a href="/city/Pune"      class="nav-link {% if active=='Pune' %}active{% endif %}"><span class="city-dot" style="background:#2196F3"></span>Pune</a>
    <a href="/city/Bangalore" class="nav-link {% if active=='Bangalore' %}active{% endif %}"><span class="city-dot" style="background:#9C27B0"></span>Bangalore</a>
    <a href="/city/Hyderabad" class="nav-link {% if active=='Hyderabad' %}active{% endif %}"><span class="city-dot" style="background:#FF9800"></span>Hyderabad</a>
    <a href="/city/Delhi"     class="nav-link {% if active=='Delhi' %}active{% endif %}"><span class="city-dot" style="background:#43A047"></span>Delhi</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Reports</div>
    <a href="/monthly"   class="nav-link {% if active=='monthly' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Monthly
    </a>
    <a href="/materials" class="nav-link {% if active=='materials' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Materials
    </a>
    <a href="/fails"     class="nav-link {% if active=='fails' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Failures
    </a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Operations</div>
    <a href="/orders"   class="nav-link {% if active=='orders' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Orders
    </a>
    <a href="/designs"  class="nav-link {% if active=='designs' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>New Designs
    </a>
    <a href="/pendency" class="nav-link {% if active=='pendency' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Live Pendency
    </a>
  </div>
  <div class="sidebar-footer">
    <button class="sync-btn" id="syncBtn" onclick="syncNow()">⟳ Sync Now</button>
    <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:8px;text-align:center">Auto-sync every 2 hours</div>
  </div>
</aside>
<main class="main">{% block content %}{% endblock %}</main>
<script>
function syncNow(){
  const btn=document.getElementById('syncBtn');
  btn.textContent='⟳ Syncing…';btn.disabled=true;
  fetch('/api/sync',{method:'POST'})
    .then(r=>r.json())
    .then(d=>{btn.textContent=d.ok?'✅ Done!':'❌ Error';if(d.ok)setTimeout(()=>location.reload(),1200);else btn.disabled=false;})
    .catch(()=>{btn.textContent='❌ Error';btn.disabled=false;});
}
</script>
</body>
</html>
