<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinny 3DP — {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --sidebar-w:230px;
      --body-bg:#eef0fa;
      --card-bg:#ffffff;
      --text-dark:#0f1117;
      --text-mid:#4b5563;
      --text-light:#9ca3af;
      --border:#e9eaef;
      --radius:16px;
      --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
      --shadow-md:0 4px 10px rgba(16,24,40,.06),0 10px 24px -6px rgba(16,24,40,.10);
      --shadow-lg:0 8px 16px rgba(16,24,40,.08),0 20px 40px -12px rgba(16,24,40,.16);
      --pink:#e91e63;
      --pink-dark:#ad1457;
      --pink-glow:rgba(233,30,99,.35);
    }
    *{scrollbar-width:thin;scrollbar-color:#d1d5db transparent}
    *::-webkit-scrollbar{width:8px;height:8px}
    *::-webkit-scrollbar-track{background:transparent}
    *::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:8px}
    *::-webkit-scrollbar-thumb:hover{background:#9ca3af}

    body{
      font-family:'Inter',sans-serif;color:var(--text-dark);display:flex;min-height:100vh;
      -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
      background:
        radial-gradient(1200px 700px at 100% -10%, rgba(233,30,99,.16), transparent 65%),
        radial-gradient(1100px 600px at -5% 25%, rgba(124,58,237,.15), transparent 60%),
        radial-gradient(1000px 600px at 55% 105%, rgba(37,99,235,.13), transparent 60%),
        radial-gradient(700px 500px at 90% 90%, rgba(245,158,11,.08), transparent 55%),
        var(--body-bg);
    }
    main.main{animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 var(--pink-glow)}50%{box-shadow:0 0 0 5px rgba(233,30,99,0)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

    /* ===== SIDEBAR ===== */
    .sidebar{
      width:var(--sidebar-w);min-height:100vh;
      background:linear-gradient(200deg,#0a0b12 0%,#12131f 45%,#1a1228 75%,#20142e 100%);
      position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100;
      overflow-y:auto;overflow-x:hidden;box-shadow:2px 0 24px rgba(0,0,0,.3);
      border-right:1px solid rgba(255,255,255,.04);
    }
    .sidebar::before{
      content:'';position:absolute;top:0;left:0;right:0;height:180px;pointer-events:none;
      background:radial-gradient(220px 140px at 20% 0%, rgba(233,30,99,.16), transparent 70%);
    }
    .sidebar-logo{padding:26px 20px 20px;border-bottom:1px solid rgba(255,255,255,.07);position:relative}
    .app-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:.2px;display:flex;align-items:center;gap:9px}
    .app-name span.logo-dot{
      display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:9px;
      background:linear-gradient(135deg,var(--pink),#7c3aed);font-size:14px;flex-shrink:0;
      box-shadow:0 4px 10px rgba(233,30,99,.35);
    }
    .app-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em;margin-left:37px}
    .nav-section{padding:14px 0 4px}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:1.4px;color:rgba(255,255,255,.2);padding:0 20px 7px;text-transform:uppercase}
    .nav-link{
      display:flex;align-items:center;gap:10px;padding:9.5px 20px;color:rgba(255,255,255,.56);
      text-decoration:none;font-size:13.5px;font-weight:500;border-left:3px solid transparent;
      transition:all .18s cubic-bezier(.4,0,.2,1);position:relative;
    }
    .nav-link:hover{background:rgba(255,255,255,.045);color:#fff;padding-left:23px}
    .nav-link.active{
      background:linear-gradient(90deg,rgba(233,30,99,.18),rgba(233,30,99,.02) 80%);
      color:#fff;border-left-color:var(--pink);font-weight:600;
    }
    .nav-link.active::after{
      content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      background:var(--pink);box-shadow:0 0 8px var(--pink-glow);
    }
    .nav-link svg{opacity:.85;flex-shrink:0;transition:opacity .15s}
    .nav-link:hover svg,.nav-link.active svg{opacity:1}
    .city-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 7px currentColor}
    .nav-link .nav-badge{
      margin-left:auto;font-size:9px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;
      background:linear-gradient(135deg,var(--pink),#7c3aed);color:#fff;padding:2px 6px;border-radius:6px;
      box-shadow:0 0 8px var(--pink-glow);
    }
    .sidebar-footer{margin-top:auto;padding:16px 16px 20px;border-top:1px solid rgba(255,255,255,.07)}
    .sync-btn{
      width:100%;padding:11px;background:linear-gradient(135deg,var(--pink),var(--pink-dark));
      color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;
      transition:transform .15s,box-shadow .15s;box-shadow:0 3px 12px rgba(233,30,99,.38);
      letter-spacing:.01em;
    }
    .sync-btn:hover{transform:translateY(-1.5px);box-shadow:0 6px 18px rgba(233,30,99,.5)}
    .sync-btn:active{transform:translateY(0)}
    .sync-btn:disabled{background:#4b5563;cursor:not-allowed;box-shadow:none;transform:none}
    .main{margin-left:var(--sidebar-w);flex:1;padding:30px 34px 50px}

    /* ===== HEADERS ===== */
    .page-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:8px;padding-bottom:16px;border-bottom:2px solid transparent;border-image:linear-gradient(90deg,var(--pink),#7c3aed,transparent) 1}
    .page-title{font-size:22px;font-weight:800;color:#0a0c12;letter-spacing:-.015em}
    .page-meta{font-size:12.5px;color:var(--text-light)}

    /* ===== CARDS ===== */
    .cards-row{display:grid;gap:15px;margin-bottom:22px}
    .cards-4{grid-template-columns:repeat(4,1fr)}
    .cards-3{grid-template-columns:repeat(3,1fr)}
    .cards-2{grid-template-columns:repeat(2,1fr)}
    .card{
      background:var(--card-bg);border-radius:var(--radius);padding:19px 21px;
      box-shadow:var(--shadow);border:1px solid var(--border);border-top:3px solid var(--pink);
      transition:box-shadow .2s ease,transform .2s ease;
    }
    .card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .card-label{font-size:11.5px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .card-value{font-size:28px;font-weight:800;margin-top:7px;line-height:1;letter-spacing:-.02em}
    .card-sub{font-size:12px;color:var(--text-mid);margin-top:6px}

    /* Gradient KPI variants */
    .gcard{
      border-radius:var(--radius);padding:19px 21px;color:#fff;box-shadow:var(--shadow-md);
      position:relative;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease;
    }
    .gcard::before{
      content:'';position:absolute;top:-40%;right:-20%;width:140px;height:140px;border-radius:50%;
      background:rgba(255,255,255,.08);pointer-events:none;
    }
    .gcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
    .gcard .card-label{color:rgba(255,255,255,.85);position:relative}
    .gcard .card-value{color:#fff;position:relative}
    .gcard .card-sub{color:rgba(255,255,255,.8);position:relative}
    .g-blue{background:linear-gradient(135deg,#2563eb,#1e3a8a)}
    .g-green{background:linear-gradient(135deg,#16a34a,#14532d)}
    .g-red{background:linear-gradient(135deg,#dc2626,#7f1d1d)}
    .g-pink{background:linear-gradient(135deg,#e91e63,#9d174d)}
    .g-purple{background:linear-gradient(135deg,#7c3aed,#4c1d95)}
    .g-amber{background:linear-gradient(135deg,#f59e0b,#92400e)}
    .g-dark{background:linear-gradient(135deg,#1f2937,#0b0f17)}

    .city-card{
      background:var(--card-bg);border-radius:var(--radius);padding:19px 21px;box-shadow:var(--shadow);
      border:1px solid var(--border);border-top:3px solid;transition:box-shadow .2s ease,transform .2s ease;
    }
    .city-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
    .city-card-name{font-size:13px;font-weight:700;margin-bottom:12px}

    .table-card{
      background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
      border:1px solid var(--border);border-top:3px solid #ede9fe;overflow:hidden;margin-bottom:20px;transition:box-shadow .2s ease,border-top-color .2s ease;
    }
    .table-card:hover{box-shadow:var(--shadow-md);border-top-color:var(--pink)}
    .table-card-header{
      padding:15px 19px;border-bottom:1px solid var(--border);font-size:13.5px;font-weight:700;
      display:flex;align-items:center;justify-content:space-between;
      background:linear-gradient(135deg,#fdf2f8,#faf5ff 60%,#ffffff);
    }
    .table-card-header small{font-size:11px;color:var(--text-light);font-weight:400}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#831843;background:linear-gradient(135deg,#fce7f3,#ede9fe);border-bottom:2px solid #e9d5f2}
    tbody tr{border-bottom:1px solid var(--border);transition:background .12s;border-left:3px solid transparent}
    tbody tr:nth-child(even){background:#f3edfc}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#fce7f3!important;border-left-color:var(--pink)}
    tbody td{padding:10.5px 14px;color:var(--text-dark)}
    .td-part{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.01em}
    .b-completed{background:#dcfce7;color:#166534}
    .b-failed{background:#fee2e2;color:#991b1b}
    .b-printing{background:#dbeafe;color:#1e40af}
    .b-cancelled{background:#f3f4f6;color:#6b7280}
    .b-queued{background:#fef9c3;color:#854d0e}
    .b-fulfilled{background:#dcfce7;color:#166534}
    .b-pending{background:#fef9c3;color:#854d0e}
    .b-city{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .section-title{font-size:13.5px;font-weight:700;color:var(--text-mid);margin:24px 0 12px;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:8px}
    .mono{font-family:'JetBrains Mono',monospace;font-size:12px}
    .text-green{color:#16a34a}
    .text-red{color:#dc2626}
    select.filter-select{padding:7px 11px;border:1px solid var(--border);border-radius:9px;font-size:13px;background:#fff;cursor:pointer;transition:border-color .15s}
    select.filter-select:hover{border-color:#d1d5db}
    input.search-input{padding:8px 13px;border:1px solid var(--border);border-radius:9px;font-size:13px;outline:none;width:260px;transition:border-color .15s,box-shadow .15s}
    input.search-input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(233,30,99,.1)}
    @media(max-width:900px){.cards-4{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="app-name"><span class="logo-dot">🖨️</span>Spinny 3DP</div>
    <div class="app-sub">Fleet Operations CRM</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <a href="/" class="nav-link {% if active=='dash' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard
    </a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Cities</div>
    <a href="/city/Pune"      class="nav-link {% if active=='Pune' %}active{% endif %}"><span class="city-dot" style="background:#2196F3;color:#2196F3"></span>Pune</a>
    <a href="/city/Bangalore" class="nav-link {% if active=='Bangalore' %}active{% endif %}"><span class="city-dot" style="background:#9C27B0;color:#9C27B0"></span>Bangalore</a>
    <a href="/city/Hyderabad" class="nav-link {% if active=='Hyderabad' %}active{% endif %}"><span class="city-dot" style="background:#FF9800;color:#FF9800"></span>Hyderabad</a>
    <a href="/city/Delhi"     class="nav-link {% if active=='Delhi' %}active{% endif %}"><span class="city-dot" style="background:#43A047;color:#43A047"></span>Delhi</a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Reports</div>
    <a href="/monthly"   class="nav-link {% if active=='monthly' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Monthly
    </a>
    <a href="/materials" class="nav-link {% if active=='materials' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Materials
    </a>
    <a href="/fails"     class="nav-link {% if active=='fails' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Failures
    </a>
    <a href="/analytics" class="nav-link {% if active=='analytics' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 14l3-3 3 3 4-4"/></svg>Analytics
    </a>
    <a href="/deep" class="nav-link {% if active=='deep' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4a7 7 0 100 14 7 7 0 000-14z"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v3l2 2"/></svg>Deep Analytics<span class="nav-badge">New</span>
    </a>
  </div>
  <div class="nav-section">
    <div class="nav-label">Operations</div>
    <a href="/orders"   class="nav-link {% if active=='orders' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Orders
    </a>
    <a href="/designs"  class="nav-link {% if active=='designs' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>New Designs
    </a>
    <a href="/stock" class="nav-link {% if active=='stock' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8V21H3V8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Daily Materials
    </a>
    <a href="/wastage" class="nav-link {% if active=='wastage' %}active{% endif %}">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>Wastage Report
    </a>
  </div>
  <div class="sidebar-footer">
    <button class="sync-btn" id="syncBtn" onclick="syncNow()">⟳ Sync Now</button>
    <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:8px;text-align:center">Auto-sync every 2 hours</div>
  </div>
</aside>
<main class="main">{% block content %}{% endblock %}</main>
<script>
function syncNow(){
  const btn=document.getElementById('syncBtn');
  btn.textContent='⟳ Syncing…';btn.disabled=true;
  fetch('/api/sync',{method:'POST'})
    .then(r=>r.json())
    .then(d=>{btn.textContent=d.ok?'✅ Done!':'❌ Error';if(d.ok)setTimeout(()=>location.reload(),1200);else btn.disabled=false;})
    .catch(()=>{btn.textContent='❌ Error';btn.disabled=false;});
}
</script>
</body>
</html>
